<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Physical Education by Hemant Sir</title>

    <meta name="description" content="Contact Physical Education by Hemant Sir for help, queries, or suggestions.">
    <link rel="stylesheet" href="contact.css">
</head>

<body>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-55BQCWQK4B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-55BQCWQK4B');
    </script>

    <header class="top-bar">
        <a href="index.html" class="floating-home">🏠</a>
    </header>

    <section class="contact-page">
        <div class="contact-container">

            <!-- LEFT SIDE -->
            <div class="contact-info">
                <h1>Contact Us</h1>
                <p>Have any questions, suggestions, or issues? Feel free to contact us anytime.</p>

                <div class="info-box">
                    <h3>📧 Email</h3>
                    <p>your@email.com</p>
                </div>

                <div class="info-box">
                    <h3>📞 Phone</h3>
                    <p>+91 9876543210</p>
                </div>

                <div class="info-box">
                    <h3>📍 Location</h3>
                    <p>India</p>
                </div>

                <!-- WhatsApp Button -->
                <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-btn">
                    💬 Chat on WhatsApp
                </a>
            </div>

            <!-- RIGHT SIDE FORM -->
            <div class="contact-form">
                <h2>Send Message</h2>

                <form action="#" method="POST">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </div>

        </div>
    </section>

</body>

</html>
